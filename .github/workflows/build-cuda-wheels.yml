name: Build CUDA Wheels

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to build'
        required: true
        type: choice
        options:
          - lmdeploy
          - flash-attn
          - exllamav3
          - causal-conv1d
          - sglang
          - custom
      custom_repo:
        description: 'Custom repo URL (only if project=custom)'
        required: false
        type: string
      custom_ref:
        description: 'Branch/tag/commit (default: main)'
        required: false
        default: 'main'
        type: string
      python_version:
        description: 'Python version'
        required: true
        default: '3.12'
        type: choice
        options:
          - '3.12'
          - '3.11'
          - '3.13'
      cuda_version:
        description: 'CUDA toolkit version'
        required: true
        default: '13.0'
        type: choice
        options:
          - '13.0'
          - '13.1'
          - '12.8'
          - '12.6'
          - '12.4'
      torch_version:
        description: 'PyTorch version+cu tag (e.g. 2.11.0, leave empty for latest)'
        required: false
        default: '2.11.0'
        type: string
      torch_index:
        description: 'PyTorch wheel index suffix (e.g. cu130, cu128)'
        required: false
        default: 'cu130'
        type: string
      cuda_arch:
        description: 'CUDA architectures (semicolon-separated)'
        required: true
        default: '8.6'
        type: string
      max_jobs:
        description: 'Parallel build jobs'
        required: false
        default: '8'
        type: string

env:
  PYTHON_VERSION: ${{ inputs.python_version }}
  CUDA_ARCH: ${{ inputs.cuda_arch }}
  MAX_JOBS: ${{ inputs.max_jobs }}

jobs:
  build:
    runs-on: Tesla_16gb_Gpu
    timeout-minutes: 120

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /opt/hostedtoolcache
          sudo apt-get clean
          echo "Free space:"
          df -h /

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install CUDA ${{ inputs.cuda_version }}
        uses: Jimver/cuda-toolkit@v0.2.30
        id: cuda-toolkit
        with:
          cuda: ${{ inputs.cuda_version }}.0
          method: 'network'
          linux-local-args: '["--toolkit"]'

      - name: Install PyTorch
        run: |
          python -m pip install --upgrade pip setuptools wheel ninja cmake
          TORCH_INDEX="https://download.pytorch.org/whl/${{ inputs.torch_index }}"
          TORCH_TEST_INDEX="https://download.pytorch.org/whl/test/${{ inputs.torch_index }}"
          if [ -n "${{ inputs.torch_version }}" ]; then
            echo "Trying stable index first: $TORCH_INDEX"
            python -m pip install torch==${{ inputs.torch_version }} --index-url "$TORCH_INDEX" 2>/dev/null || \
            { echo "Not on stable, trying test/RC index: $TORCH_TEST_INDEX"; \
              python -m pip install torch==${{ inputs.torch_version }} --index-url "$TORCH_TEST_INDEX"; }
          else
            echo "Installing latest torch from $TORCH_INDEX"
            python -m pip install torch --index-url "$TORCH_INDEX"
          fi
          python -c "import torch; print('torch:', torch.__version__, 'cuda:', torch.version.cuda)"

      - name: Set build environment
        run: |
          echo "CUDA_HOME=${{ steps.cuda-toolkit.outputs.CUDA_PATH }}" >> $GITHUB_ENV
          echo "TORCH_CUDA_ARCH_LIST=${{ inputs.cuda_arch }}" >> $GITHUB_ENV
          echo "MAX_JOBS=${{ inputs.max_jobs }}" >> $GITHUB_ENV
          # Some projects need these
          echo "FORCE_CUDA=1" >> $GITHUB_ENV
          echo "CUDA_VISIBLE_DEVICES=0" >> $GITHUB_ENV

      - name: Resolve project
        id: project
        run: |
          case "${{ inputs.project }}" in
            lmdeploy)
              echo "repo=https://github.com/InternLM/lmdeploy.git" >> $GITHUB_OUTPUT
              echo "ref=${{ inputs.custom_ref || 'main' }}" >> $GITHUB_OUTPUT
              echo "build_cmd=pip wheel . --no-deps --wheel-dir dist/" >> $GITHUB_OUTPUT
              echo "pre_cmd=pip install cmake_build_extension pyyaml addict mmengine-lite" >> $GITHUB_OUTPUT
              ;;
            flash-attn)
              echo "repo=https://github.com/Dao-AILab/flash-attention.git" >> $GITHUB_OUTPUT
              echo "ref=${{ inputs.custom_ref || 'v2.8.3' }}" >> $GITHUB_OUTPUT
              echo "build_cmd=pip wheel . --no-deps --no-build-isolation --wheel-dir dist/" >> $GITHUB_OUTPUT
              echo "pre_cmd=pip install packaging einops" >> $GITHUB_OUTPUT
              ;;
            exllamav3)
              echo "repo=https://github.com/turboderp-org/exllamav3.git" >> $GITHUB_OUTPUT
              echo "ref=${{ inputs.custom_ref || 'main' }}" >> $GITHUB_OUTPUT
              echo "build_cmd=pip wheel . --no-deps --no-build-isolation --wheel-dir dist/" >> $GITHUB_OUTPUT
              echo "pre_cmd=pip install packaging ninja safetensors" >> $GITHUB_OUTPUT
              ;;
            causal-conv1d)
              echo "repo=https://github.com/Dao-AILab/causal-conv1d.git" >> $GITHUB_OUTPUT
              echo "ref=${{ inputs.custom_ref || 'main' }}" >> $GITHUB_OUTPUT
              echo "build_cmd=pip wheel . --no-deps --no-build-isolation --wheel-dir dist/" >> $GITHUB_OUTPUT
              echo "pre_cmd=pip install packaging" >> $GITHUB_OUTPUT
              ;;
            sglang)
              echo "repo=https://github.com/sgl-project/sglang.git" >> $GITHUB_OUTPUT
              echo "ref=${{ inputs.custom_ref || 'main' }}" >> $GITHUB_OUTPUT
              echo "build_cmd=pip wheel . --no-deps --wheel-dir dist/" >> $GITHUB_OUTPUT
              echo "pre_cmd=pip install packaging" >> $GITHUB_OUTPUT
              ;;
            custom)
              echo "repo=${{ inputs.custom_repo }}" >> $GITHUB_OUTPUT
              echo "ref=${{ inputs.custom_ref || 'main' }}" >> $GITHUB_OUTPUT
              echo "build_cmd=pip wheel . --no-deps --wheel-dir dist/" >> $GITHUB_OUTPUT
              echo "pre_cmd=echo 'no pre-install'" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Clone source
        run: |
          git clone --depth 1 --branch ${{ steps.project.outputs.ref }} ${{ steps.project.outputs.repo }} source
          cd source && git log --oneline -1

      - name: Install project prerequisites
        run: |
          ${{ steps.project.outputs.pre_cmd }}

      - name: Build wheel
        working-directory: source
        run: |
          echo "=== Build Config ==="
          echo "CUDA_HOME=$CUDA_HOME"
          echo "TORCH_CUDA_ARCH_LIST=$TORCH_CUDA_ARCH_LIST"
          echo "MAX_JOBS=$MAX_JOBS"
          python -c "import torch; print('torch:', torch.__version__, 'cuda:', torch.version.cuda)"
          nvcc --version | tail -1
          gcc --version | head -1
          echo "Free space: $(df -h / | tail -1 | awk '{print $4}')"
          echo "RAM: $(free -h | grep Mem | awk '{print $2}')"
          echo "CPUs: $(nproc)"
          echo "==================="

          ${{ steps.project.outputs.build_cmd }} 2>&1 | tail -50

          echo "=== Built wheels ==="
          ls -lh dist/*.whl

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project }}-py${{ inputs.python_version }}-${{ inputs.torch_index }}-sm${{ inputs.cuda_arch }}
          path: source/dist/*.whl
          retention-days: 90
          if-no-files-found: error

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Project | ${{ inputs.project }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python | ${{ inputs.python_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CUDA Toolkit | ${{ inputs.cuda_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Torch | $(python -c 'import torch; print(torch.__version__)') |" >> $GITHUB_STEP_SUMMARY
          echo "| Torch CUDA | $(python -c 'import torch; print(torch.version.cuda)') |" >> $GITHUB_STEP_SUMMARY
          echo "| SM Arch | ${{ inputs.cuda_arch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MAX_JOBS | ${{ inputs.max_jobs }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Wheel | $(basename $(ls source/dist/*.whl | head -1)) |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | $(ls -lh source/dist/*.whl | awk '{print $5}') |" >> $GITHUB_STEP_SUMMARY
